name: Deploy nihil-tools

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-nihil-tools
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Nuxt app
        run: pnpm build

  deploy:
    name: Deploy to VPS
    runs-on: [self-hosted, Linux, X64, nihil-tools-deploy]
    needs: build
    if: github.ref == 'refs/heads/master'
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/root/nihil-tools' }}
      DEPLOY_PORT_APP: ${{ secrets.DEPLOY_PORT_APP || '3000' }}

    steps:
      - name: Deploy locally on target server
        run: |
          set -euo pipefail

          APP_DIR="$DEPLOY_PATH"
          APP_PORT="$DEPLOY_PORT_APP"

          if [ "$APP_PORT" != "3000" ]; then
            echo "Refusing deployment: nihil-tools must use port 3000, got $APP_PORT"
            exit 1
          fi

          if [ ! -d "$APP_DIR/.git" ]; then
            echo "Repository is not checked out at $APP_DIR"
            exit 1
          fi

          cd "$APP_DIR"
          git fetch origin master
          git reset --hard origin/master

          corepack enable
          pnpm install --frozen-lockfile
          pnpm build

          systemctl disable --now trpg-tools.service || true
          systemctl restart nihil-tools.service
          systemctl is-active --quiet nihil-tools.service

          for attempt in $(seq 1 30); do
            if curl -fsS -I "http://127.0.0.1:${APP_PORT}/apps" >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "nihil-tools did not become ready on port ${APP_PORT}"
          systemctl status nihil-tools.service --no-pager -l || true
          exit 1
